<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Blog Personal</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS personalizado -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <!-- Navbar (COMPLETAR: agregar logo, links activos, menú colapsable) -->
    <nav class="navbar navbar-expand-md navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Mi Blog</a>
            <!-- TODO: agregar toggler y nav-items -->
        </div>
    </nav>

    <!-- Hero section -->
    <header class="bg-gradient text-white py-5">
        <div class="container text-center">
            <h1 class="display-4">Bienvenido a Mi Blog</h1>
            <p class="lead">Historias, tecnología y reflexiones</p>
        </div>
    </header>

    <!-- Main: listado de artículos -->
    <main class="py-5">
        <div class="container">
            <h2 class="mb-4">Artículos Recientes</h2>

            <!-- Grid de tarjetas (COMPLETAR: 3+ artículos) -->
            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm">
                        <img src="assets/images/article-1.jpg" class="card-img-top" alt="Artículo 1">
                        <div class="card-body">
                            <h5 class="card-title">Primer Artículo</h5>
                            <p class="card-text text-muted">Autor: Tu Nombre</p>
                            <p class="card-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit...</p>
                            <a href="#" class="btn btn-primary btn-sm">Leer más</a>
                        </div>
                    </div>
                </div>
                <!-- TODO: agregar 2 más -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 Mi Blog. Todos los derechos reservados.</p>
            <!-- TODO: agregar redes sociales -->
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
